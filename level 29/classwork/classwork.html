<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Internal CSS Example</title>
    <style>
        .blue-text {
            color: blue;
            font-size: 20px;
            font-weight: bold;
        }

        #green-bg {
            background-color: lightgreen;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <p style="color: red; font-size: 18px;">ეს ტექსტი წითელია და inline CSS-ით სტილიზებულია.</p>

    <p style="font-family: Arial, sans-serif; color: purple;">ეს ტექსტი internal CSS-ის გამოყენებით სტილიზებულია.</p>

    <p class="blue-text">ეს ტექსტი internal CSS კლასით სტილიზებულია.</p>

    <p id="green-bg">ეს ტექსტი internal CSS ID-ით სტილიზებულია.</p>

</body>
</html>
